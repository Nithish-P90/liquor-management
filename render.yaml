services:
  - type: web
    name: liquor-management
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm ci && chmod +x scripts/migrate-deploy-with-retry.sh && ./scripts/migrate-deploy-with-retry.sh
    startCommand: npm run start
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: FALLBACK_PIN
        value: "1006"
      - key: ALLOW_PIN_FALLBACK
        value: "false"
