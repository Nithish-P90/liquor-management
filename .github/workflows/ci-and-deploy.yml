name: CI & Deploy (Render)

permissions:
  contents: write
  checks: write

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (and generate Prisma client)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost/ci' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-build-secret-not-used-at-runtime' }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://ci:ci@localhost/ci' }}
        run: npm run build

      - name: Lint
        run: npm run lint

  auto-merge:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Attempt auto-merge into main
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.ref; // refs/heads/branch
            const head = ref.replace('refs/heads/', '');
            const base = 'main';
            if (head === base) {
              core.info('Head is main; nothing to merge');
              return;
            }
            core.info(`Attempting to merge ${head} into ${base}`);
            try {
              const merge = await github.rest.repos.merge({ owner, repo, base, head, commit_message: `Auto-merge ${head} into ${base}` });
              core.info(`Merge successful: ${merge.data.sha}`);
            } catch (err) {
              if (err.status === 409) {
                core.info('Merge conflict detected; creating a pull request for manual resolution');
                // create pull request if one doesn't exist
                const prs = await github.rest.pulls.list({ owner, repo, head: `${owner}:${head}`, base });
                if (prs.data.length === 0) {
                  await github.rest.pulls.create({ owner, repo, title: `Manual merge required: ${head} → ${base}`, head, base, body: 'Auto-created PR due to merge conflicts; please resolve.' });
                } else {
                  core.info('Existing PR found; no new PR created');
                }
              } else {
                throw err;
              }
            }

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy (hook or API)
        shell: bash
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          echo "Branch: $BRANCH"
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "Using RENDER_DEPLOY_HOOK"
            curl -X POST -H "Content-Type: application/json" -d "{\"branch\":\"$BRANCH\",\"commit\":\"${GITHUB_SHA}\"}" "$RENDER_DEPLOY_HOOK"
          elif [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID" ]; then
            echo "Using Render API"
            curl -s -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" -H "Authorization: Bearer $RENDER_API_KEY" -H "Content-Type: application/json" -d "{\"clearCache\":false}"
          else
            echo "No Render secrets configured; skipping deploy."
          fi
