name: Daily Rollover Trigger

on:
  schedule:
    # 18:30 UTC = 00:00 IST
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  trigger-rollover:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger rollover endpoint
        env:
          APP_BASE_URL: ${{ secrets.ROLLOVER_APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "Missing secret: ROLLOVER_APP_BASE_URL"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing secret: CRON_SECRET"
            exit 1
          fi

          URL="${APP_BASE_URL%/}/api/cron/rollover"
          echo "Calling $URL"

          http_code=$(curl -sS -o response.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL")

          echo "HTTP $http_code"
          cat response.json

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Rollover trigger failed"
            exit 1
          fi
